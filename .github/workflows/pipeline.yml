name: WellnessTourism-CI-CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-train-evaluate-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run preprocessing
      run: python src/preprocessing.py

    - name: Train model
      run: python src/train.py

    - name: Evaluate model
      run: python src/evaluate.py

    - name: Build Docker image
      run: |
        docker build -t wellness-tourism:latest -f docker/Dockerfile .

    - name: Push model to Hugging Face Hub
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        pip install huggingface_hub
        python src/deploy.py

    - name: Deploy to Hugging Face Space (Docker SDK)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        pip install huggingface_hub
        huggingface-cli upload docker/Dockerfile Murali0606/WellnessTourism --repo-type=space --token $HF_TOKEN
        huggingface-cli upload app.py Murali0606/WellnessTourism --repo-type=space --token $HF_TOKEN
        huggingface-cli upload requirements.txt Murali0606/WellnessTourism --repo-type=space --token $HF_TOKEN
        huggingface-cli upload src Murali0606/WellnessTourism --repo-type=space --token $HF_TOKEN
